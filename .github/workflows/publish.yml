# Sample workflow for building and deploying a mdBook site to GitHub Pages
#
# To get started with mdBook see: https://rust-lang.github.io/mdBook/index.html
#
name: Publish book content to GH Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      # Pin both tools so deploys are reproducible, matched to the
      # mdBook we run locally (mdbook v0.5.3). Bump deliberately
      # (and re-test the theme) rather than tracking latest.
      MDBOOK_VERSION: 0.5.3
      # 0.17.0 targets mdBook 0.5 (uses mdbook-preprocessor) -- the
      # matching mermaid for the mdBook pinned above.
      # (The 0.16.x line targets mdBook 0.4.52.)
      MDBOOK_MERMAID_VERSION: 0.17.0
    steps:
      - uses: actions/checkout@v4
      - uses: cargo-bins/cargo-binstall@main
      - name: Install mdBook
        run: cargo binstall --no-confirm --version ${MDBOOK_VERSION} mdbook
      - name: Install mermaid for mdBook
        run: cargo binstall --no-confirm --version ${MDBOOK_MERMAID_VERSION} mdbook-mermaid
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Build with mdBook
        run: mdbook build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
